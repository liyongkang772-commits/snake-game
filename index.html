<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇大作战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { display: block; }

  #leaderboard {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 180px;
    color: #fff;
    font-size: 13px;
    pointer-events: none;
  }
  #leaderboard .lb-title {
    font-size: 15px; font-weight: 700;
    color: #00d2ff; margin-bottom: 6px;
    letter-spacing: 2px; text-align: center;
  }
  #leaderboard .lb-snake {
    display: flex; justify-content: space-between;
    padding: 2px 0; font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #leaderboard .lb-snake:last-child { border-bottom: none; }
  #leaderboard .lb-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 6px;
  }
  #leaderboard .lb-name { color: #ccc; }
  #leaderboard .lb-score2 { color: #eee; font-weight: 600; }
  #leaderboard .lb-player { background: rgba(0,210,255,0.1); border-radius: 4px; margin: 0 -6px; padding: 2px 6px; }
  #leaderboard .lb-player .lb-name { color: #00d2ff; }
  #leaderboard .lb-me {
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.1);
    text-align: center; font-size: 14px;
  }
  #leaderboard .lb-me span { color: #00d2ff; font-weight: 700; font-size: 17px; }

  #controls {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 10; pointer-events: none;
  }
  #controls button {
    pointer-events: auto;
    background: rgba(0,210,255,0.15);
    border: 1px solid rgba(0,210,255,0.3);
    color: #fff; padding: 8px 22px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; backdrop-filter: blur(4px);
  }
  #controls button:hover { background: rgba(0,210,255,0.3); }

  #hint {
    position: fixed; bottom: 70px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 13px;
    z-index: 10; pointer-events: none; transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="leaderboard">
  <div class="lb-title">🏆 排行榜</div>
  <div id="lbList"></div>
  <div class="lb-me">我的积分: <span id="lbScore">10</span></div>
</div>
<div id="controls">
  <button id="restartBtn">重新开始</button>
  <button id="pauseBtn">暂停</button>
</div>
<div id="hint">🖱 鼠标控制 · 左键加速(消耗积分) · 空格暂停 · 吃掉AI蛇!</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const lbListEl = document.getElementById('lbList');
const lbScoreEl = document.getElementById('lbScore');

const WORLD_W = 4000, WORLD_H = 4000;
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// === Leaderboard ===
const LB_KEY = 'snakeBattleLeaderboard';
function loadScores() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; }
}
function saveScores(scores) { localStorage.setItem(LB_KEY, JSON.stringify(scores.slice(0, 10))); }
function addScore(score) {
  const scores = loadScores();
  scores.push({ score, date: Date.now() });
  scores.sort((a, b) => b.score - a.score);
  saveScores(scores);
}
function renderLeaderboard() {
  const entries = [['你', score, '#00d2ff'], ...aiSnakes.map(a => [a.name, a.score, a.color])];
  entries.sort((a, b) => b[1] - a[1]);
  let html = '';
  for (let i = 0; i < Math.min(entries.length, 8); i++) {
    const [name, sc, col] = entries[i];
    const isPlayer = name === '你';
    const cls = isPlayer ? ' lb-player' : '';
    html += `<div class="lb-snake${cls}"><span class="lb-name"><span class="lb-dot" style="background:${col}"></span>${name}</span><span class="lb-score2">${sc}</span></div>`;
  }
  lbListEl.innerHTML = html;
  lbScoreEl.textContent = score;
}

// === Game State ===
let snake, foods, mouseX, mouseY, score, gameOver, paused;
let angle, speed;
let camera;
let boosting = false, boostTick = 0;
let aiSnakes = [];
const INIT_SCORE = 10;
let hintTimer;

// AI names
const AI_NAMES = ['小蓝', '小绿', '小紫', '小橙', '小红', '小青', '小粉', '小黄', '小白', '小灰'];
const AI_COLORS = ['#4a9eff', '#4ae04a', '#b44aff', '#ff8c42', '#ff4757', '#42e0c4', '#ff6b9d', '#ffd93d', '#c0c0c0', '#a0a0a0'];

function spawnAiSnake() {
  const idx = aiSnakes.length;
  const ang = Math.random() * Math.PI * 2;
  const sx = Math.random() * WORLD_W;
  const sy = Math.random() * WORLD_H;
  const body = [];
  const len = 8 + Math.floor(Math.random() * 8);
  for (let i = 0; i < len; i++) {
    body.push({ x: sx - Math.cos(ang) * i * 6, y: sy - Math.sin(ang) * i * 6 });
  }
  aiSnakes.push({
    body, angle: ang, score: len,
    speed: 2 + Math.random() * 0.8,
    color: AI_COLORS[idx % AI_COLORS.length],
    name: AI_NAMES[idx % AI_NAMES.length],
    targetFood: null,
    tick: 0
  });
}

function initAiSnakes(count) {
  aiSnakes = [];
  for (let i = 0; i < count; i++) spawnAiSnake();
}

function init() {
  angle = Math.random() * Math.PI * 2;
  speed = 2.8;
  gameOver = false;
  paused = false;
  boosting = false;
  boostTick = 0;
  document.getElementById('pauseBtn').textContent = '暂停';

  const sx = WORLD_W / 2, sy = WORLD_H / 2;
  snake = [];
  for (let i = 0; i < 10; i++) {
    snake.push({ x: sx - Math.cos(angle) * i * 6, y: sy - Math.sin(angle) * i * 6 });
  }
  score = INIT_SCORE;

  mouseX = W / 2; mouseY = H / 2;
  camera = { x: sx - W/2, y: sy - H/2 };

  foods = [];
  for (let i = 0; i < 150; i++) spawnFood();

  initAiSnakes(6);

  renderLeaderboard();

  clearTimeout(hintTimer);
  const hint = document.getElementById('hint');
  hint.style.opacity = '1';
  hintTimer = setTimeout(() => hint.style.opacity = '0', 4000);
}

function spawnFood() {
  foods.push({
    x: Math.random() * WORLD_W, y: Math.random() * WORLD_H,
    r: 3 + Math.random() * 4,
    color: `hsl(${Math.random() * 360}, 90%, 60%)`
  });
}

// === AI Logic ===
function updateAi(ai) {
  ai.tick++;
  const head = ai.body[0];

  // 1. Find nearest food
  let nearest = null, nearDist = Infinity;
  for (const f of foods) {
    const dx = f.x - head.x, dy = f.y - head.y;
    let d2 = dx * dx + dy * dy;
    // Consider wrap distance
    const hw = WORLD_W / 2, hh = WORLD_H / 2;
    if (dx > hw) d2 = (dx - WORLD_W) ** 2 + dy * dy;
    else if (dx < -hw) d2 = (dx + WORLD_W) ** 2 + dy * dy;
    if (dy > hh) d2 = dx * dx + (dy - WORLD_H) ** 2;
    else if (dy < -hh) d2 = dx * dx + (dy + WORLD_H) ** 2;
    if (d2 < nearDist) { nearDist = d2; nearest = f; }
  }

  // 2. Steer toward food
  let targetAngle = ai.angle;
  if (nearest) {
    targetAngle = Math.atan2(nearest.y - head.y, nearest.x - head.x);
  }

  // 3. Avoid threats (other snake bodies)
  const avoidRadius = 80;
  let avoidX = 0, avoidY = 0;
  let inDanger = false;

  // Check player body
  for (const seg of snake) {
    const dx = head.x - seg.x, dy = head.y - seg.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < avoidRadius && dist > 0) {
      avoidX += (head.x - seg.x) / dist;
      avoidY += (head.y - seg.y) / dist;
      inDanger = true;
    }
  }
  // Check other AI bodies
  for (const other of aiSnakes) {
    if (other === ai) continue;
    for (const seg of other.body) {
      const dx = head.x - seg.x, dy = head.y - seg.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < avoidRadius && dist > 0) {
        avoidX += (head.x - seg.x) / dist;
        avoidY += (head.y - seg.y) / dist;
        inDanger = true;
      }
    }
  }

  if (inDanger) {
    const avoidAngle = Math.atan2(avoidY, avoidX);
    // Blend: 60% avoid, 40% food
    let diff = avoidAngle - targetAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    targetAngle += diff * 0.6;
  }

  // Smooth turn
  let diff = targetAngle - ai.angle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  ai.angle += diff * 0.08;

  // Move
  const newHead = {
    x: head.x + Math.cos(ai.angle) * ai.speed,
    y: head.y + Math.sin(ai.angle) * ai.speed
  };

  // Wrap
  if (newHead.x < 0) newHead.x += WORLD_W;
  if (newHead.x > WORLD_W) newHead.x -= WORLD_W;
  if (newHead.y < 0) newHead.y += WORLD_H;
  if (newHead.y > WORLD_H) newHead.y -= WORLD_H;

  // Self collision for AI
  for (let i = 5; i < ai.body.length; i++) {
    const dx = newHead.x - ai.body[i].x, dy = newHead.y - ai.body[i].y;
    if (dx * dx + dy * dy < 8 * 8) return true; // AI dies
  }

  ai.body.unshift(newHead);

  // Eat food
  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    const dx = newHead.x - f.x, dy = newHead.y - f.y;
    if (dx * dx + dy * dy < (6 + f.r) * (6 + f.r)) {
      foods.splice(i, 1);
      spawnFood();
      ai.score++;
      break; // AI eats one food per tick max
    }
  }

  while (ai.body.length > ai.score) ai.body.pop();

  return false; // alive
}

// === Collision: player vs AI ===
function checkPlayerAiCollision() {
  const head = snake[0];
  if (!head) return;
  for (let ai of aiSnakes) {
    for (let i = 0; i < ai.body.length; i++) {
      const seg = ai.body[i];
      const dx = head.x - seg.x, dy = head.y - seg.y;
      const dist2 = dx * dx + dy * dy;
      const hitR = i === 0 ? 12 : 8;
      if (dist2 < hitR * hitR) {
        if (i === 0) {
          // Player head vs AI head — whoever is bigger wins
          if (score > ai.score) {
            // Player eats AI
            score += ai.score;
            aiSnakes = aiSnakes.filter(a => a !== ai);
            spawnAiSnake();
            return; // processed one collision
          } else {
            // AI eats player
            gameOver = true;
            addScore(score);
            return;
          }
        } else {
          // Player hits AI body
          gameOver = true;
          addScore(score);
          return;
        }
      }
    }
    // Also check: AI head vs player body
    if (!gameOver) {
      const aiHead = ai.body[0];
      for (let i = 5; i < snake.length; i++) {
        const dx = aiHead.x - snake[i].x, dy = aiHead.y - snake[i].y;
        if (dx * dx + dy * dy < 8 * 8) {
          // AI hits player body — AI dies and turns into food
          for (const seg of ai.body) {
            foods.push({ x: seg.x, y: seg.y, r: 2 + Math.random() * 3, color: `hsl(${Math.random() * 360}, 90%, 60%)` });
          }
          aiSnakes = aiSnakes.filter(a => a !== ai);
          return;
        }
      }
    }
  }
}

// === Main Update ===
function update() {
  if (paused || gameOver) return;

  const sizeScale = 1 + (score - INIT_SCORE) * 0.02;

  // Boost consumes points
  if (boosting) {
    if (score <= INIT_SCORE) { boosting = false; boostTick = 0; }
    else {
      boostTick++;
      if (boostTick >= 8) { boostTick = 0; score--; }
    }
  }

  const head = snake[0];
  const worldMouseX = mouseX + camera.x;
  const worldMouseY = mouseY + camera.y;
  const targetAngle = Math.atan2(worldMouseY - head.y, worldMouseX - head.x);

  let diff = targetAngle - angle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  angle += diff * 0.1;

  const currentSpeed = boosting ? speed * 1.5 : speed;
  const newHead = {
    x: head.x + Math.cos(angle) * currentSpeed,
    y: head.y + Math.sin(angle) * currentSpeed
  };

  if (newHead.x < 0) newHead.x += WORLD_W;
  if (newHead.x > WORLD_W) newHead.x -= WORLD_W;
  if (newHead.y < 0) newHead.y += WORLD_H;
  if (newHead.y > WORLD_H) newHead.y -= WORLD_H;

  // Self collision
  for (let i = 5; i < snake.length; i++) {
    const dx = newHead.x - snake[i].x, dy = newHead.y - snake[i].y;
    if (dx * dx + dy * dy < (8 * sizeScale) ** 2) {
      gameOver = true;
      addScore(score);
      return;
    }
  }

  snake.unshift(newHead);

  // Food check
  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    const dx = newHead.x - f.x, dy = newHead.y - f.y;
    if (dx * dx + dy * dy < (6 + f.r) * (6 + f.r)) {
      foods.splice(i, 1);
      spawnFood();
      score++;
    }
  }

  snake.pop(); // maintain constant length

  // Update AI
  for (let i = aiSnakes.length - 1; i >= 0; i--) {
    const died = updateAi(aiSnakes[i]);
    if (died) {
      aiSnakes.splice(i, 1);
      spawnAiSnake();
    }
  }

  // Player vs AI collision
  checkPlayerAiCollision();

  // Respawn dead AI if too few
  while (aiSnakes.length < 5) spawnAiSnake();

  camera.x += (newHead.x - W/2 - camera.x) * 0.1;
  camera.y += (newHead.y - H/2 - camera.y) * 0.1;

  renderLeaderboard();
}

// === Drawing ===
function drawAi(ai) {
  for (let i = ai.body.length - 1; i >= 0; i--) {
    const seg = ai.body[i];
    const sx = seg.x - camera.x, sy = seg.y - camera.y;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
    const ratio = 1 - i / ai.body.length;
    const radius = (4 + ratio * 3);
    const r = parseInt(ai.color.slice(1,3), 16);
    const g = parseInt(ai.color.slice(3,5), 16);
    const b = parseInt(ai.color.slice(5,7), 16);
    const dim = 0.5 + ratio * 0.5;
    ctx.fillStyle = `rgba(${r * dim | 0},${g * dim | 0},${b * dim | 0},1)`;
    ctx.shadowColor = ai.color + '33';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(sx, sy, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Head
  const head = ai.body[0];
  if (head) {
    const hx = head.x - camera.x, hy = head.y - camera.y;
    ctx.shadowColor = ai.color + '66';
    ctx.shadowBlur = 12;
    ctx.fillStyle = ai.color;
    ctx.beginPath();
    ctx.arc(hx, hy, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    const perpX = Math.cos(ai.angle + Math.PI / 2) * 3.5;
    const perpY = Math.sin(ai.angle + Math.PI / 2) * 3.5;
    const fwdX = Math.cos(ai.angle) * 3;
    const fwdY = Math.sin(ai.angle) * 3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX, hy + fwdY + perpY, 2, 0, Math.PI * 2);
    ctx.arc(hx + fwdX - perpX, hy + fwdY - perpY, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX + Math.cos(ai.angle) * 1, hy + fwdY + perpY + Math.sin(ai.angle) * 1, 1, 0, Math.PI * 2);
    ctx.arc(hx + fwdX - perpX + Math.cos(ai.angle) * 1, hy + fwdY - perpY + Math.sin(ai.angle) * 1, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const gs = 80;
  const sx = -(camera.x % gs), sy = -(camera.y % gs);
  for (let x = sx; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = sy; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  ctx.strokeStyle = 'rgba(255,50,50,0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8,8]);
  ctx.strokeRect(-camera.x, -camera.y, WORLD_W, WORLD_H);
  ctx.setLineDash([]);

  // Food
  for (const f of foods) {
    const fx = f.x - camera.x, fy = f.y - camera.y;
    if (fx < -20 || fx > W + 20 || fy < -20 || fy > H + 20) continue;
    ctx.shadowColor = f.color; ctx.shadowBlur = 8;
    ctx.fillStyle = f.color;
    ctx.beginPath(); ctx.arc(fx, fy, f.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // AI snakes (behind player)
  for (const ai of aiSnakes) drawAi(ai);

  // Player snake body
  const sizeScale = 1 + (score - INIT_SCORE) * 0.02;
  const segR = 6 * sizeScale;
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const sx2 = seg.x - camera.x, sy2 = seg.y - camera.y;
    if (sx2 < -20 || sx2 > W + 20 || sy2 < -20 || sy2 > H + 20) continue;
    const hue = 140;
    ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
    ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.15)`;
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(sx2, sy2, segR, 0, Math.PI * 2); ctx.fill();
  }

  // Player head
  const head = snake[0];
  if (head) {
    const hx = head.x - camera.x, hy = head.y - camera.y;
    ctx.shadowColor = 'rgba(0,210,255,0.5)'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#00d2ff';
    ctx.beginPath(); ctx.arc(hx, hy, segR, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0;
    const perpX = Math.cos(angle + Math.PI/2) * (3.5 * sizeScale);
    const perpY = Math.sin(angle + Math.PI/2) * (3.5 * sizeScale);
    const fwdX = Math.cos(angle) * (2.5 * sizeScale);
    const fwdY = Math.sin(angle) * (2.5 * sizeScale);
    const eyeR = 2 * sizeScale;

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX, hy + fwdY + perpY, eyeR, 0, Math.PI*2);
    ctx.arc(hx + fwdX - perpX, hy + fwdY - perpY, eyeR, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#111';
    const pupilR = 0.9 * sizeScale;
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX + Math.cos(angle) * eyeR * 0.5, hy + fwdY + perpY + Math.sin(angle) * eyeR * 0.5, pupilR, 0, Math.PI*2);
    ctx.arc(hx + fwdX - perpX + Math.cos(angle) * eyeR * 0.5, hy + fwdY - perpY + Math.sin(angle) * eyeR * 0.5, pupilR, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Boost FX
  if (boosting && !paused && !gameOver) {
    const head2 = snake[0];
    if (head2) {
      const hx = head2.x - camera.x, hy = head2.y - camera.y;
      const sz = 1 + (score - INIT_SCORE) * 0.02;
      for (let i = 3; i > 0; i--) {
        const bx = hx - Math.cos(angle) * i * 10 * sz;
        const by = hy - Math.sin(angle) * i * 10 * sz;
        ctx.fillStyle = `rgba(0,210,255,${0.15 - i*0.04})`;
        ctx.beginPath(); ctx.arc(bx, by, (5-i)*sz, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  // Overlay
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4757';
    ctx.font = `bold ${Math.min(W,H)*0.07}px system-ui`;
    ctx.fillText('💀 游戏结束', W/2, H/2 - 30);
    ctx.fillStyle = '#ccc';
    ctx.font = `${Math.min(W,H)*0.03}px system-ui`;
    ctx.fillText(`积分: ${score}`, W/2, H/2 + 30);
  } else if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W,H)*0.06}px system-ui`;
    ctx.fillText('⏸ 暂停', W/2, H/2);
  }
}

// === Controls ===
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) boosting = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) boosting = false; });
canvas.addEventListener('mouseleave', () => { boosting = false; });

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Escape') {
    e.preventDefault();
    if (gameOver) return;
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
  }
});
document.getElementById('restartBtn').addEventListener('click', init);
document.getElementById('pauseBtn').addEventListener('click', () => {
  if (gameOver) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
});

// === Game loop ===
init();
let lastTime = 0;
function gameLoop(time) {
  const dt = time - lastTime;
  if (dt > 16) { update(); draw(); lastTime = time; }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
