<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .game-wrapper {
    background: #16213e;
    padding: 30px 40px 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
  }
  h1 {
    color: #00d2ff;
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(0,210,255,0.3);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #eee;
    font-size: 18px;
  }
  .header span { color: #00d2ff; font-weight: bold; font-size: 22px; }
  canvas {
    display: block;
    margin: 0 auto;
    border-radius: 12px;
    background: #0f3460;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
  }
  .controls {
    margin-top: 18px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    background: linear-gradient(135deg, #00d2ff, #3a7bd5);
    border: none;
    color: #fff;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,210,255,0.4); }
  button:active { transform: translateY(0); }
  .mobile-btns {
    display: none;
    grid-template-columns: repeat(3, 60px);
    gap: 6px;
    justify-content: center;
    margin-top: 12px;
  }
  .mobile-btns button {
    padding: 12px;
    font-size: 20px;
    min-width: unset;
  }
  .mobile-btns .empty { visibility: hidden; }
  .hint {
    color: #888;
    font-size: 13px;
    margin-top: 10px;
  }
  @media (max-width: 520px) {
    .game-wrapper { padding: 16px; border-radius: 12px; }
    h1 { font-size: 20px; }
    .mobile-btns { display: grid; }
  }
  @media (pointer: coarse) {
    .mobile-btns { display: grid; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>🐍 贪吃蛇</h1>
  <div class="header">
    <div>得分: <span id="score">0</span></div>
    <div>最高: <span id="highScore">0</span></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <button id="restartBtn">重新开始</button>
    <button id="pauseBtn">暂停</button>
  </div>
  <div class="mobile-btns" id="mobileBtns">
    <div></div><button data-dir="up">▲</button><div></div>
    <button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button>
  </div>
  <div class="hint">↑ ↓ ← → 或 WASD 控制方向</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');

// === Game config ===
const GRID = 20;
const SIZE = canvas.width / GRID; // 20

// === State ===
let snake, food, direction, nextDirection, score, highScore;
let gameOver, win, paused, loop;

function init() {
  snake = [{x: 10, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  gameOver = false;
  win = false;
  paused = false;
  scoreEl.textContent = '0';
  document.getElementById('pauseBtn').textContent = '暂停';
  spawnFood();
}

function spawnFood() {
  const total = GRID * GRID;
  if (snake.length >= total) { win = true; return; }

  // Fast O(1) random food placement using set
  const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
  if (snakeSet.size >= total) { win = true; return; }

  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
  } while (snakeSet.has(`${pos.x},${pos.y}`));
  food = pos;
}

function tick() {
  if (paused || gameOver || win) return;

  direction = {...nextDirection};

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // Wall wrap
  if (head.x < 0) head.x = GRID - 1;
  if (head.x >= GRID) head.x = 0;
  if (head.y < 0) head.y = GRID - 1;
  if (head.y >= GRID) head.y = 0;

  // Self collision
  const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
  if (hitSelf) { gameOver = true; draw(); return; }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
    }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * SIZE, 0); ctx.lineTo(i * SIZE, canvas.height);
    ctx.moveTo(0, i * SIZE); ctx.lineTo(canvas.width, i * SIZE);
    ctx.stroke();
  }

  // Snake body
  snake.forEach((seg, i) => {
    const ratio = 1 - i / snake.length;
    const hue = 140 + ratio * 60; // green → yellow-green
    const lightness = 50 + ratio * 15;
    ctx.fillStyle = `hsl(${hue}, 80%, ${lightness}%)`;
    ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.3)`;
    ctx.shadowBlur = 8;
    const pad = 1;
    ctx.beginPath();
    ctx.roundRect(seg.x * SIZE + pad, seg.y * SIZE + pad, SIZE - pad*2, SIZE - pad*2, 3);
    ctx.fill();
  });

  // Snake head eyes
  const head = snake[0];
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  const eyeSize = 3;
  const cx = head.x * SIZE + SIZE/2;
  const cy = head.y * SIZE + SIZE/2;
  const off = 4;
  ctx.beginPath();
  ctx.arc(cx + direction.x * off - direction.y * off, cy + direction.y * off - direction.x * off, eyeSize, 0, Math.PI*2);
  ctx.arc(cx + direction.x * off + direction.y * off, cy + direction.y * off + direction.x * off, eyeSize, 0, Math.PI*2);
  ctx.fill();

  // Food
  if (food) {
    ctx.shadowColor = 'rgba(255, 50, 50, 0.5)';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff4757';
    const fx = food.x * SIZE + SIZE/2;
    const fy = food.y * SIZE + SIZE/2;
    const pulse = 1 + Math.sin(Date.now() / 200) * 0.15;
    ctx.beginPath();
    ctx.arc(fx, fy, (SIZE/2 - 2) * pulse, 0, Math.PI*2);
    ctx.fill();

    // Shine
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(fx - 2, fy - 2, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // Overlay messages
  ctx.shadowBlur = 0;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (win) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00d2ff';
    ctx.font = 'bold 36px system-ui';
    ctx.fillText('🎉 你赢了！', canvas.width/2, canvas.height/2 - 14);
    ctx.fillStyle = '#ccc';
    ctx.font = '16px system-ui';
    ctx.fillText('你填满了整个棋盘！', canvas.width/2, canvas.height/2 + 26);
  } else if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff4757';
    ctx.font = 'bold 36px system-ui';
    ctx.fillText('💀 游戏结束', canvas.width/2, canvas.height/2 - 14);
    ctx.fillStyle = '#ccc';
    ctx.font = '16px system-ui';
    ctx.fillText(`得分: ${score}`, canvas.width/2, canvas.height/2 + 26);
  } else if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px system-ui';
    ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2);
  }
}

// === Controls ===
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    'w': {x:0,y:-1}, 'W': {x:0,y:-1},
    's': {x:0,y:1}, 'S': {x:0,y:1},
    'a': {x:-1,y:0}, 'A': {x:-1,y:0},
    'd': {x:1,y:0}, 'D': {x:1,y:0},
  };
  const newDir = map[e.key];
  if (!newDir) return;
  e.preventDefault();
  // Prevent 180° reversal
  if (direction.x + newDir.x === 0 && direction.y + newDir.y === 0) return;
  nextDirection = newDir;
});

// Touch buttons
document.querySelectorAll('[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    const map = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} };
    const newDir = map[btn.dataset.dir];
    if (direction.x + newDir.x === 0 && direction.y + newDir.y === 0) return;
    nextDirection = newDir;
  });
});

document.getElementById('restartBtn').addEventListener('click', () => {
  init();
  draw();
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  if (gameOver || win) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
  draw();
});

// === Animate food pulse ===
let foodAnim;
function startFoodAnim() {
  if (foodAnim) cancelAnimationFrame(foodAnim);
  function loop() {
    if (!paused && !gameOver && !win) draw();
    foodAnim = requestAnimationFrame(loop);
  }
  loop();
}

// === Init ===
highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
highScoreEl.textContent = highScore;
init();
draw();
startFoodAnim();

// Game loop
let speed = 130;
loop = setInterval(tick, speed);
</script>
</body>
</html>
