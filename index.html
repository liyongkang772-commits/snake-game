<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇大作战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas {
    display: block;
  }

  /* Leaderboard */
  #leaderboard {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 170px;
    color: #fff;
    font-size: 13px;
    pointer-events: none;
  }
  #leaderboard .lb-title {
    font-size: 15px;
    font-weight: 700;
    color: #00d2ff;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-align: center;
  }
  #leaderboard .lb-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #leaderboard .lb-row:last-child { border-bottom: none; }
  #leaderboard .lb-rank { color: #888; width: 24px; }
  #leaderboard .lb-score { color: #eee; font-weight: 600; }
  #leaderboard .lb-current {
    background: rgba(0,210,255,0.12);
    border-radius: 4px;
    padding: 3px 6px;
    margin: 0 -6px;
  }
  #leaderboard .lb-current .lb-score { color: #00d2ff; }
  #leaderboard .lb-my {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    font-size: 15px;
  }
  #leaderboard .lb-my span { color: #00d2ff; font-weight: 700; font-size: 18px; }
  #leaderboard .lb-empty {
    color: #666;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
  }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
  }
  #controls button {
    pointer-events: auto;
    background: rgba(0,210,255,0.15);
    border: 1px solid rgba(0,210,255,0.3);
    color: #fff;
    padding: 8px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  #controls button:hover { background: rgba(0,210,255,0.3); }

  #hint {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="leaderboard">
  <div class="lb-title">🏆 排行榜</div>
  <div id="lbList"></div>
  <div class="lb-my">当前积分: <span id="lbScore">10</span></div>
</div>
<div id="controls">
  <button id="restartBtn">重新开始</button>
  <button id="pauseBtn">暂停</button>
</div>
<div id="hint">🖱 移动鼠标控制方向 · 按住左键加速(消耗积分) · 空格暂停</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const lbListEl = document.getElementById('lbList');
const lbScoreEl = document.getElementById('lbScore');

// === Config ===
const WORLD_W = 4000, WORLD_H = 4000;
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// === Leaderboard ===
const LB_KEY = 'snakeBattleLeaderboard';
function loadScores() {
  try {
    return JSON.parse(localStorage.getItem(LB_KEY)) || [];
  } catch { return []; }
}
function saveScores(scores) {
  localStorage.setItem(LB_KEY, JSON.stringify(scores.slice(0, 10)));
}
function addScore(score) {
  const scores = loadScores();
  scores.push({ score, date: Date.now() });
  scores.sort((a, b) => b.score - a.score);
  saveScores(scores);
  return scores;
}
function renderLeaderboard(currentScore) {
  const scores = loadScores();
  let html = '';
  if (scores.length === 0) {
    html = '<div class="lb-empty">暂无记录，快来玩一局！</div>';
  } else {
    const show = scores.slice(0, 5);
    show.forEach((entry, i) => {
      const isCurrent = entry.score === currentScore && i < 3;
      const rowClass = isCurrent ? ' lb-current' : '';
      html += `<div class="lb-row${rowClass}">
        <span class="lb-rank">#${i + 1}</span>
        <span class="lb-score">${entry.score}</span>
      </div>`;
    });
  }
  lbListEl.innerHTML = html;
  lbScoreEl.textContent = currentScore || 10;
}

// === State ===
let snake, foods, mouseX, mouseY, score, gameOver, paused;
let angle, speed;
let camera;
let boosting = false;
let boostTick = 0;

const INIT_SCORE = 10;

let hintTimer;

function init() {
  angle = Math.random() * Math.PI * 2;
  speed = 2.8;
  gameOver = false;
  paused = false;
  document.getElementById('pauseBtn').textContent = '暂停';

  const sx = WORLD_W / 2, sy = WORLD_H / 2;
  snake = [];
  for (let i = 0; i < 10; i++) {
    snake.push({ x: sx - Math.cos(angle) * i * 6, y: sy - Math.sin(angle) * i * 6 });
  }
  score = INIT_SCORE;
  boostTick = 0;

  mouseX = W / 2;
  mouseY = H / 2;

  camera = { x: sx - W/2, y: sy - H/2 };

  foods = [];
  for (let i = 0; i < 120; i++) spawnFood();

  renderLeaderboard(score);

  clearTimeout(hintTimer);
  const hint = document.getElementById('hint');
  hint.style.opacity = '1';
  hintTimer = setTimeout(() => hint.style.opacity = '0', 4000);
}

function spawnFood() {
  foods.push({
    x: Math.random() * WORLD_W,
    y: Math.random() * WORLD_H,
    r: 3 + Math.random() * 4,
    color: `hsl(${Math.random() * 360}, 90%, 60%)`
  });
}

function update() {
  if (paused || gameOver) return;

  const sizeScale = 1 + (score - INIT_SCORE) * 0.02;

  // Boost consumes points
  if (boosting) {
    if (score <= INIT_SCORE) {
      boosting = false;
      boostTick = 0;
    } else {
      boostTick++;
      if (boostTick >= 8) {
        boostTick = 0;
        score--;
        renderLeaderboard(score);
      }
    }
  }

  const head = snake[0];
  const worldMouseX = mouseX + camera.x;
  const worldMouseY = mouseY + camera.y;
  const targetAngle = Math.atan2(worldMouseY - head.y, worldMouseX - head.x);

  let diff = targetAngle - angle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  angle += diff * 0.1;

  const currentSpeed = boosting ? speed * 1.5 : speed;
  const newHead = {
    x: head.x + Math.cos(angle) * currentSpeed,
    y: head.y + Math.sin(angle) * currentSpeed
  };

  // World wrap
  if (newHead.x < 0) newHead.x += WORLD_W;
  if (newHead.x > WORLD_W) newHead.x -= WORLD_W;
  if (newHead.y < 0) newHead.y += WORLD_H;
  if (newHead.y > WORLD_H) newHead.y -= WORLD_H;

  // Self collision
  const collisionR = 8 * sizeScale;
  for (let i = 5; i < snake.length; i++) {
    const dx = newHead.x - snake[i].x;
    const dy = newHead.y - snake[i].y;
    if (dx * dx + dy * dy < collisionR * collisionR) {
      gameOver = true;
      addScore(score);
      renderLeaderboard(score);
      return;
    }
  }

  snake.unshift(newHead);

  // Food check
  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    const dx = newHead.x - f.x;
    const dy = newHead.y - f.y;
    if (dx * dx + dy * dy < (6 + f.r) * (6 + f.r)) {
      foods.splice(i, 1);
      spawnFood();
      score++;
      renderLeaderboard(score);
    }
  }

  while (snake.length > score) snake.pop();

  camera.x += (newHead.x - W/2 - camera.x) * 0.1;
  camera.y += (newHead.y - H/2 - camera.y) * 0.1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const gs = 80;
  const sx = -(camera.x % gs);
  const sy = -(camera.y % gs);
  for (let x = sx; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = sy; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // World boundary
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.strokeRect(-camera.x, -camera.y, WORLD_W, WORLD_H);
  ctx.setLineDash([]);

  // Food
  for (const f of foods) {
    const fx = f.x - camera.x;
    const fy = f.y - camera.y;
    if (fx < -20 || fx > W + 20 || fy < -20 || fy > H + 20) continue;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(fx, fy, f.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Body size grows with score
  const sizeScale = 1 + (score - INIT_SCORE) * 0.02;
  // Snake body
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const sx2 = seg.x - camera.x;
    const sy2 = seg.y - camera.y;
    if (sx2 < -20 || sx2 > W + 20 || sy2 < -20 || sy2 > H + 20) continue;

    const ratio = 1 - i / snake.length;
    const radius = (5 + ratio * 4) * sizeScale;
    const hue = 140 + ratio * 50;
    ctx.fillStyle = `hsl(${hue}, 80%, ${45 + ratio * 20}%)`;
    ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.15)`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(sx2, sy2, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Head
  const head = snake[0];
  if (head) {
    const hx = head.x - camera.x;
    const hy = head.y - camera.y;
    const headR = 9 * sizeScale;
    ctx.shadowColor = 'rgba(0, 210, 255, 0.5)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#00d2ff';
    ctx.beginPath();
    ctx.arc(hx, hy, headR, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    const perpX = Math.cos(angle + Math.PI / 2) * (4.5 * sizeScale);
    const perpY = Math.sin(angle + Math.PI / 2) * (4.5 * sizeScale);
    const fwdX = Math.cos(angle) * (3.5 * sizeScale);
    const fwdY = Math.sin(angle) * (3.5 * sizeScale);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX, hy + fwdY + perpY, 2.8 * sizeScale, 0, Math.PI * 2);
    ctx.arc(hx + fwdX - perpX, hy + fwdY - perpY, 2.8 * sizeScale, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(hx + fwdX + perpX + Math.cos(angle) * (1.2 * sizeScale), hy + fwdY + perpY + Math.sin(angle) * (1.2 * sizeScale), 1.3 * sizeScale, 0, Math.PI * 2);
    ctx.arc(hx + fwdX - perpX + Math.cos(angle) * (1.2 * sizeScale), hy + fwdY - perpY + Math.sin(angle) * (1.2 * sizeScale), 1.3 * sizeScale, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;

  // Boost effect
  drawBoostFX();

  // Overlay
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff4757';
    ctx.font = `bold ${Math.min(W, H) * 0.07}px system-ui`;
    ctx.fillText('💀 游戏结束', W / 2, H / 2 - 30);
    ctx.fillStyle = '#ccc';
    ctx.font = `${Math.min(W, H) * 0.03}px system-ui`;
    ctx.fillText(`积分: ${score}`, W / 2, H / 2 + 30);
  } else if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.06}px system-ui`;
    ctx.fillText('⏸ 暂停', W / 2, H / 2);
  }
}

// === Controls ===
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) boosting = true;
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) boosting = false;
});
canvas.addEventListener('mouseleave', () => { boosting = false; });

function drawBoostFX() {
  if (!boosting || paused || gameOver) return;
  const head = snake[0];
  if (!head) return;
  const sz = 1 + (score - 10) * 0.02;
  const hx = head.x - camera.x;
  const hy = head.y - camera.y;
  ctx.shadowBlur = 0;
  for (let i = 3; i > 0; i--) {
    const bx = hx - Math.cos(angle) * i * 10 * sz;
    const by = hy - Math.sin(angle) * i * 10 * sz;
    const r = (5 - i) * sz;
    ctx.fillStyle = `rgba(0, 210, 255, ${0.15 - i * 0.04})`;
    ctx.beginPath();
    ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Escape') {
    e.preventDefault();
    if (gameOver) return;
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
  }
});

document.getElementById('restartBtn').addEventListener('click', init);
document.getElementById('pauseBtn').addEventListener('click', () => {
  if (gameOver) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
});

// === Game loop ===
init();

let lastTime = 0;
function gameLoop(time) {
  const dt = time - lastTime;
  if (dt > 16) { update(); draw(); lastTime = time; }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
